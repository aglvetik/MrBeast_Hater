name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.10-bookworm
        env:
          POSTGRES_DB: pingguard_test
          POSTGRES_USER: pingguard
          POSTGRES_PASSWORD: pingguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pingguard -d pingguard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DISCORD_TOKEN: test-token
      DISCORD_APPLICATION_ID: "123456789012345678"
      DATABASE_URL: postgres://pingguard:pingguard@localhost:5432/pingguard_test
      LOG_PRETTY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run db:check
      - run: docker build .

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
