services:
  postgres:
    image: postgres:17.10-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pingguard}
      POSTGRES_USER: ${POSTGRES_USER:-pingguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  bot:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pingguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pingguard}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
    expose:
      - "8080"
    networks:
      - internal

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      - bot
    ports:
      - "80:80"
      - "443:443"
    environment:
      BASE_URL: ${BASE_URL:-http://localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv/site:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
